name: Build and Release

on:
  push:
    tags:
      - 'v*'

# Force all actions to use Node 24 runtime like GitHub wants
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: EC327-Boids-Mac
          - os: windows-latest
            artifact_name: EC327-Boids-Windows
          - os: ubuntu-latest
            artifact_name: EC327-Boids-Linux

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    # Install Mac dependencies
    - name: Install macOS Dependencies
      if: matrix.os == 'macos-latest'
      run: brew install glfw

    # Install Linux OS prerequisites for Linux build
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config ninja-build libgl1-mesa-dev xorg-dev \
                               libx11-dev libxcursor-dev libxi-dev libxinerama-dev \
                               libxrandr-dev libxft-dev libwayland-dev libxkbcommon-dev

    # Install Windows & Linux GLFW via VCPKG
    - name: Install GLFW (Windows & Linux)
      if: matrix.os != 'macos-latest'
      shell: bash
      run: |
        # Force vcpkg to integrate with the shell
        $VCPKG_INSTALLATION_ROOT/vcpkg integrate install
        
        if [ "$RUNNER_OS" == "Windows" ]; then
          $VCPKG_INSTALLATION_ROOT/vcpkg install glfw3:x64-windows
        else
          # On Linux, we need to ensure vcpkg uses the system's libraries to build
          export VCPKG_FORCE_SYSTEM_BINARIES=1
          $VCPKG_INSTALLATION_ROOT/vcpkg install glfw3:x64-linux
        fi
      
    # Configure CMake
    - name: Configure CMake
      if: matrix.os == 'macos-latest'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    # Configure CMake (Windows & Linux)
    - name: Configure CMake (Windows & Linux)
      if: matrix.os != 'macos-latest'
      shell: bash
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=${{ matrix.os == 'windows-latest' && 'x64-windows' || 'x64-linux' }}

    # Build the Project
    - name: Build
      run: cmake --build build --config Release --parallel 4

    # Package Mac
    - name: Package Mac
      if: matrix.os == 'macos-latest'
      run: |
        cd build
        zip -r ../${{ matrix.artifact_name }}.zip EC327-Boids.app

    # Package Windows and Linux
    - name: Package Windows & Linux
      if: matrix.os != 'macos-latest'
      shell: bash
      run: |
        mkdir -p package/assets package/shaders
        cp -r assets/* package/assets/
        cp -r shaders/* package/shaders/
        
        if [ "$RUNNER_OS" == "Windows" ]; then
          # Find and copy the Windows executable
          cp build/Release/EC327-Boids.exe package/ || cp build/EC327-Boids.exe package/
          # Use 7z (7-Zip) which is available on GitHub's Windows runners
          7z a -tzip ../${{ matrix.artifact_name }}.zip ./package/*
        else
          # Standard Linux packaging
          cp build/EC327-Boids package/
          cd package
          zip -r ../${{ matrix.artifact_name }}.zip ./*
        fi

    # Upload Artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4 
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Download Artifacts
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
        
      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EC327-Boids-Mac/EC327-Boids-Mac.zip
            EC327-Boids-Windows/EC327-Boids-Windows.zip
            EC327-Boids-Linux/EC327-Boids-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}