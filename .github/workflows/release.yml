name: Build and Release

on:
  push:
    tags:
      - 'v*'

# Force all actions to use Node 24 runtime like GitHub wants
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: EC327-Boids-Mac
          - os: windows-latest
            artifact_name: EC327-Boids-Windows
          - os: ubuntu-latest
            artifact_name: EC327-Boids-Linux

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    # Install Mac dependencies
    - name: Install macOS Dependencies
      if: matrix.os == 'macos-latest'
      run: brew install glfw

    # Install Windows & Linux GLFW via VCPKG
    - name: Install GLFW (Windows & Linux)
      if: matrix.os != 'macos-latest'
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          vcpkg install glfw3:x64-windows
        else
          vcpkg install glfw3:x64-linux
        fi
      
    # Configure CMake
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    # Build the Project
    - name: Build
      run: cmake --build build --config Release --parallel 4

    # Package Mac
    - name: Package Mac
      if: matrix.os == 'macos-latest'
      run: |
        cd build
        zip -r ../${{ matrix.artifact_name }}.zip EC327-Boids.app

    # Package Windows and Linux
    - name: Package Windows & Linux
      if: matrix.os != 'macos-latest'
      shell: bash
      run: |
        mkdir -p package/assets package/shaders
        cp -r assets/* package/assets/
        cp -r shaders/* package/shaders/
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp build/Release/EC327-Boids.exe package/ || cp build/EC327-Boids.exe package/
        else
          cp build/EC327-Boids package/
        fi
        cd package
        zip -r ../${{ matrix.artifact_name }}.zip ./*

    # Upload Artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4 
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Download Artifacts
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
        
      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EC327-Boids-Mac/EC327-Boids-Mac.zip
            EC327-Boids-Windows/EC327-Boids-Windows.zip
            EC327-Boids-Linux/EC327-Boids-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}